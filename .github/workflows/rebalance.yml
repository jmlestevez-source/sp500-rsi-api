name: Weekly Portfolio Rebalance

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      update_universe:
        description: "Forzar actualización Russell 1000"
        required: false
        default: "false"
        type: boolean

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rebalance
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.PAT_TOKEN }}
          GITHUB_REPO:    ${{ github.repository }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.update_universe }}" = "true" ]; then
            ARGS="--update-universe"
          fi
          python rebalance.py $ARGS

      - name: Commit data persistente
        if: always()
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Crear carpetas si no existen para
          # que git add no falle en primer run
          mkdir -p data/positions \
                   data/rebalances \
                   data/trades \
                   data/performance

          # Crear current.json vacío si no existe
          # para que el primer run tenga algo que commitear
          if [ ! -f data/positions/current.json ]; then
            echo "{}" > data/positions/current.json
          fi

          git add data/positions/current.json \
                  data/rebalances/ \
                  data/trades/ \
                  data/performance/ \
                  2>/dev/null || true

          # Solo hace commit si hay cambios reales
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear"
          else
            git commit -m "chore: rebalanceo $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rebalance-report-${{ github.run_id }}
          path: |
            data/email_report.json
            data/rebalances/
            data/trades/
            data/performance/
          retention-days: 90
