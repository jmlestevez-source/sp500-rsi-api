name: Weekly Portfolio Rebalance

on:
  schedule:
    # Lunes 9:00 UTC (11:00 Madrid)
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      update_universe:
        description: "Forzar actualización Russell 1000"
        required: false
        default: "false"
        type: boolean
      use_portfoliolabs:
        description: "Activar enriquecimiento PortfolioLabs"
        required: false
        default: "false"
        type: boolean

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome (solo si PortfolioLabs activo)
        if: >
          github.event.inputs.use_portfoliolabs == 'true'
        uses: browser-actions/setup-chrome@v1

      -       - name: Run rebalance
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:     ${{ secrets.PAT_TOKEN }}
          GITHUB_REPO:      ${{ github.repository }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.update_universe }}" = "true" ]; then
            ARGS="--update-universe"
          fi
          python rebalance.py $ARGS

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rebalance-report-${{ github.run_id }}
          path: |
            data/email_report.json
            data/rebalances/
            data/trades/
            data/performance/
          retention-days: 90
