name: Weekly Portfolio Rebalance

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      update_universe:
        description: "Forzar actualización Russell 1000"
        required: false
        default: "false"
        type: boolean

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PAT necesario para que el push
          # posterior dispare otros workflows
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rebalance
        env:
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.PAT_TOKEN }}
          GITHUB_REPO:    ${{ github.repository }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.update_universe }}" = "true" ]; then
            ARGS="--update-universe"
          fi
          python rebalance.py $ARGS

      # FIX: persistir datos entre ejecuciones
      # Sin esto, current.json se pierde en cada run
      # y siempre arranca desde cero → rentabilidad 0%
      - name: Commit data persistente
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/positions/current.json \
                  data/rebalances/ \
                  data/trades/ \
                  data/performance/ \
                  || true
          git diff --staged --quiet || \
            git commit -m "chore: rebalanceo $(date -u '+%Y-%m-%d')"
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rebalance-report-${{ github.run_id }}
          path: |
            data/email_report.json
            data/rebalances/
            data/trades/
            data/performance/
          retention-days: 90
