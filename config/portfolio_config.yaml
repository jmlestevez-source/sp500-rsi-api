portfolio:
  max_positions: 15
  max_position_size: 0.10
  min_position_size: 0.04

turnover:
  rolling_window_days: 5
  max_one_sided_turnover: 0.30
  min_position_change: 0.04

horizons:
  - 1M
  - 3M
  - 6M
  - 12M

rebalance_frequency: "twice_weekly"

optimization:
  objective: "risk_adjusted_expected_return"
  risk_metric: "bear_case_downside"
