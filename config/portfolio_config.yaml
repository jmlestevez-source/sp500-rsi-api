portfolio:
  max_positions:     20
  max_position_size: 0.12   # 12% máximo por posición
  min_position_size: 0.03   # 3% mínimo

turnover:
  max_one_sided_turnover: 0.30   # 30% máximo por rebalanceo
  min_position_change:    0.02   # 2% mínimo para generar tesis

screening:
  prescreen_top_n: 100    # candidatos tras pre-filtro cuantitativo
  llm_batch_size:  8      # tickers por llamada LLM en scoring
  min_market_cap:  500000000   # 500M mínimo

risk:
  max_sector_weight:  0.40   # 40% máximo en un sector
  max_single_country: 0.90   # para portfolios globales
